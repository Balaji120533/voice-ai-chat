<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Voice AI Chat</h1>
    </header>

    <div id="chat">
      <div class="bubble ai">
        <div class="ai-avatar">🤖</div>
        <div class="ai-content">Hi! Press the mic button and start speaking. I'll reply to whatever you say.</div>
      </div>
      <div id="interim-bubble"></div>
    </div>

    <div class="bottom">
      <p class="status" id="status">Click the mic to start</p>
      <div class="mic-wrapper" id="micWrapper">
        <div class="mic-ring"></div>
        <div class="mic-ring"></div>
        <div class="mic-ring"></div>
        <button class="mic-btn" id="micBtn" title="Start / Stop recording">🎙️</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
